<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="600" viewBox="0 0 1920 600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b4332"/>
      <stop offset="60%" style="stop-color:#2d6a4f"/>
      <stop offset="100%" style="stop-color:#1b4332"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#d4af37;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:0.15"/>
    </linearGradient>
  </defs>
  <!-- Dark green background -->
  <rect width="1920" height="600" fill="url(#bg2)"/>
  <!-- Gold shine overlay -->
  <rect width="1920" height="600" fill="url(#goldShine)"/>
  <!-- Decorative leaf pattern -->
  <g opacity="0.08">
    <path d="M-50,650 Q150,400 50,100 Q250,300 100,650Z" fill="#ffffff"/>
    <path d="M1970,650 Q1770,400 1870,100 Q1670,300 1820,650Z" fill="#ffffff"/>
  </g>
  <!-- Decorative circles -->
  <circle cx="960" cy="300" r="280" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.15"/>
  <circle cx="960" cy="300" r="320" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.08"/>
  <!-- Right side - content -->
  <!-- Small leaf icon -->
  <g transform="translate(1050,140)" opacity="0.9">
    <path d="M15,10 Q25,0 40,5 Q35,20 25,30 Q20,25 15,10Z" fill="#95d5b2"/>
    <path d="M10,20 Q20,10 35,15 Q30,30 20,40 Q15,35 10,20Z" fill="#52b788"/>
  </g>
  <text x="1070" y="175" font-family="'Playfair Display', 'Georgia', serif" font-size="16" fill="#d4af37" letter-spacing="5">NEW COLLECTION</text>
  <text x="1070" y="240" font-family="'Playfair Display', 'Georgia', serif" font-size="48" font-weight="700" fill="#ffffff">Summer Skincare</text>
  <text x="1070" y="300" font-family="'Playfair Display', 'Georgia', serif" font-size="48" font-weight="700" fill="#ffffff">Rituals</text>
  <line x1="1070" y1="335" x2="1200" y2="335" stroke="#d4af37" stroke-width="2"/>
  <text x="1070" y="375" font-family="'Poppins', 'Arial', sans-serif" font-size="16" fill="#95d5b2" letter-spacing="1">Lightweight botanical formulas for glowing summer skin</text>
  <!-- CTA -->
  <rect x="1070" y="420" width="170" height="48" rx="24" fill="#52b788"/>
  <text x="1155" y="450" font-family="'Poppins', 'Arial', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Explore New Arrivals</text>
  <!-- Left side - product display -->
  <g transform="translate(180,60)">
    <!-- Large product bottle -->
    <rect x="80" y="60" width="80" height="240" rx="25" fill="rgba(255,255,255,0.12)"/>
    <rect x="80" y="60" width="80" height="240" rx="25" fill="rgba(82,183,136,0.25)"/>
    <rect x="92" y="20" width="56" height="50" rx="12" fill="rgba(255,255,255,0.2)"/>
    <rect x="100" y="10" width="40" height="14" rx="5" fill="#d4af37"/>
    <ellipse cx="120" cy="300" rx="50" ry="12" fill="rgba(0,0,0,0.2)"/>
    <!-- Second product -->
    <rect x="230" y="80" width="65" height="210" rx="20" fill="rgba(82,183,136,0.2)"/>
    <rect x="230" y="80" width="65" height="210" rx="20" fill="rgba(255,255,255,0.06)"/>
    <rect x="240" y="40" width="45" height="50" rx="10" fill="rgba(255,255,255,0.15)"/>
    <rect x="248" y="30" width="30" height="14" rx="5" fill="#d4af37"/>
    <ellipse cx="263" cy="290" rx="40" ry="10" fill="rgba(0,0,0,0.15)"/>
    <!-- Small jar -->
    <ellipse cx="400" cy="280" rx="45" ry="25" fill="rgba(82,183,136,0.2)"/>
    <rect x="355" y="220" width="90" height="60" rx="12" fill="rgba(255,255,255,0.08)"/>
    <ellipse cx="400" cy="220" rx="45" ry="10" fill="rgba(0,0,0,0.15)"/>
    <ellipse cx="400" cy="220" rx="32" ry="6" fill="#d4af37" opacity="0.4"/>
  </g>
  <!-- Sparkle dots -->
  <g fill="#ffffff" opacity="0.2">
    <circle cx="600" cy="180" r="2"/>
    <circle cx="620" cy="210" r="1.5"/>
    <circle cx="590" cy="240" r="2.5"/>
    <circle cx="1450" cy="480" r="2"/>
    <circle cx="1480" cy="500" r="1.5"/>
    <circle cx="1460" cy="460" r="3"/>
  </g>
</svg>
