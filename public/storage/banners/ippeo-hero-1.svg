<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="600" viewBox="0 0 1920 600">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="50%" style="stop-color:#f0f7f4"/>
      <stop offset="100%" style="stop-color:#d8f3dc"/>
    </linearGradient>
    <linearGradient id="overlay1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(27,67,50,0.85)"/>
      <stop offset="100%" style="stop-color:rgba(45,106,79,0.6)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1920" height="600" fill="url(#bg1)"/>
  <!-- Decorative botanical elements -->
  <g opacity="0.08">
    <path d="M50,500 Q150,300 100,100 Q200,250 150,500Z" fill="#2d6a4f"/>
    <path d="M1800,500 Q1700,300 1750,100 Q1650,250 1700,500Z" fill="#2d6a4f"/>
    <path d="M100,550 Q300,400 200,200 Q400,350 300,550Z" fill="#52b788"/>
    <path d="M1750,550 Q1600,400 1700,200 Q1500,350 1600,550Z" fill="#52b788"/>
  </g>
  <!-- Decorative leaves pattern -->
  <g opacity="0.06">
    <ellipse cx="200" cy="450" rx="120" ry="60" fill="#1b4332" transform="rotate(-20,200,450)"/>
    <ellipse cx="1720" cy="450" rx="120" ry="60" fill="#1b4332" transform="rotate(20,1720,450)"/>
    <ellipse cx="350" cy="520" rx="80" ry="40" fill="#52b788" transform="rotate(-10,350,520)"/>
    <ellipse cx="1570" cy="520" rx="80" ry="40" fill="#52b788" transform="rotate(10,1570,520)"/>
  </g>
  <!-- Left decorative circle -->
  <circle cx="150" cy="300" r="180" fill="none" stroke="#95d5b2" stroke-width="0.5" opacity="0.3"/>
  <circle cx="150" cy="300" r="220" fill="none" stroke="#95d5b2" stroke-width="0.5" opacity="0.2"/>
  <!-- Right decorative circle -->
  <circle cx="1770" cy="300" r="180" fill="none" stroke="#95d5b2" stroke-width="0.5" opacity="0.3"/>
  <circle cx="1770" cy="300" r="220" fill="none" stroke="#95d5b2" stroke-width="0.5" opacity="0.2"/>
  <!-- Center content area -->
  <rect x="0" y="0" width="600" height="600" fill="url(#overlay1)"/>
  <!-- Leaf icon -->
  <g transform="translate(70,130)">
    <path d="M30,20 Q50,0 80,10 Q70,40 50,60 Q40,50 30,20Z" fill="#52b788" opacity="0.9"/>
    <path d="M20,40 Q40,20 70,30 Q60,60 40,80 Q30,70 20,40Z" fill="#95d5b2" opacity="0.7"/>
  </g>
  <!-- Brand text on dark overlay -->
  <text x="70" y="220" font-family="'Playfair Display', 'Georgia', serif" font-size="16" fill="#95d5b2" letter-spacing="4">IPPEO</text>
  <text x="70" y="270" font-family="'Playfair Display', 'Georgia', serif" font-size="52" font-weight="700" fill="#ffffff">Essential</text>
  <text x="70" y="330" font-family="'Playfair Display', 'Georgia', serif" font-size="52" font-weight="700" fill="#ffffff">Products</text>
  <line x1="70" y1="365" x2="200" y2="365" stroke="#d4af37" stroke-width="2" opacity="0.8"/>
  <text x="70" y="410" font-family="'Poppins', 'Arial', sans-serif" font-size="18" fill="#95d5b2" letter-spacing="1">Discover Natural Beauty</text>
  <text x="70" y="440" font-family="'Poppins', 'Arial', sans-serif" font-size="14" fill="#d8f3dc" opacity="0.8">Premium organic cosmetics for your skincare ritual</text>
  <!-- CTA Button -->
  <rect x="70" y="480" width="160" height="48" rx="24" fill="#52b788"/>
  <text x="150" y="510" font-family="'Poppins', 'Arial', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Shop Collection</text>
  <!-- Product showcase area -->
  <g transform="translate(850,60)">
    <!-- Product bottle -->
    <rect x="100" y="80" width="70" height="200" rx="20" fill="#2d6a4f" opacity="0.8"/>
    <rect x="110" y="40" width="50" height="50" rx="10" fill="#52b788"/>
    <rect x="120" y="30" width="30" height="15" rx="5" fill="#d4af37"/>
    <ellipse cx="135" cy="280" rx="40" ry="10" fill="#1b4332" opacity="0.3"/>
    <!-- Second product -->
    <rect x="240" y="100" width="60" height="180" rx="18" fill="#52b788" opacity="0.7"/>
    <rect x="248" y="60" width="44" height="48" rx="8" fill="#95d5b2"/>
    <rect x="256" y="50" width="28" height="12" rx="4" fill="#d4af37"/>
    <ellipse cx="270" cy="280" rx="35" ry="8" fill="#1b4332" opacity="0.2"/>
    <!-- Jar product -->
    <ellipse cx="380" cy="260" rx="55" ry="30" fill="#d8f3dc"/>
    <rect x="325" y="200" width="110" height="60" rx="10" fill="#2d6a4f" opacity="0.6"/>
    <ellipse cx="380" cy="200" rx="55" ry="12" fill="#1b4332" opacity="0.4"/>
    <ellipse cx="380" cy="200" rx="40" ry="8" fill="#d4af37" opacity="0.5"/>
  </g>
  <!-- Decorative dots -->
  <g fill="#95d5b2" opacity="0.15">
    <circle cx="700" cy="100" r="3"/>
    <circle cx="720" cy="130" r="2"/>
    <circle cx="690" cy="160" r="4"/>
    <circle cx="1240" cy="500" r="3"/>
    <circle cx="1270" cy="520" r="2"/>
    <circle cx="1250" cy="480" r="4"/>
  </g>
</svg>
